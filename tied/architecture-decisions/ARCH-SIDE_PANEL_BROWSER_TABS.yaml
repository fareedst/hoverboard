ARCH-SIDE_PANEL_BROWSER_TABS:
  name: Side Panel Browser Tabs Architecture
  status: Active
  cross_references:
    - REQ-SIDE_PANEL_BROWSER_TABS
  rationale:
    why: New panel lists browser tabs from chrome.tabs; referrer must be fetched by the service worker so scripting runs in tab context; filter and actions operate on visible list.
    problems_solved:
      - How to get referrer (not in chrome.tabs API)
      - Scripting from the side panel does not run in tab context; injection must be done from the service worker
      - How to scope copy/close to filtered list
    benefits:
      - 'Single panel #browserTabsPanel; data from chrome.tabs; referrer via GET_TAB_REFERRERS; search scope Tab info / Page text / Important tags via GET_TABS_PAGE_TEXT and GET_TABS_IMPORTANT_TAGS (SW executeScript per tab); scope-aware filter and actions on visible tabs'
  implementation_approach:
    summary: 'Panel uses chrome.tabs.query; scope is chosen by user (Current window default, or All windows). Referrer via GET_TAB_REFERRERS (SW executeScript per tab). Search scope: user selects Tab info (title/url/referrer), Page text (body), or Important tags (alt, h1–h3, meta, etc.); GET_TABS_PAGE_TEXT and GET_TABS_IMPORTANT_TAGS return tabId-to-string maps via SW executeScript; fetch when scope is selected or on load. Filter is scope-aware; loading state during fetch. Copy URLs, copy records as YAML, close act on visible (filtered) list.'
  traceability:
    requirements:
      - REQ-SIDE_PANEL_BROWSER_TABS
    implementation:
      - IMPL-SIDE_PANEL_BROWSER_TABS
    tests:
      - tests/unit/browser-tabs-panel.test.js
      - tests/unit/service-worker-messaging-routing.test.js
    code_annotations:
      - ARCH-SIDE_PANEL_BROWSER_TABS
  related_decisions:
    depends_on:
      - REQ-SIDE_PANEL_BROWSER_TABS
    informs:
      - IMPL-SIDE_PANEL_BROWSER_TABS
    see_also:
      - ARCH-SIDE_PANEL_TABS
  metadata:
    created:
      date: '2026-02-28'
      author: AI Agent
    last_updated:
      date: '2026-03-01'
      author: AI Agent
      reason: Add search scope (GET_TABS_PAGE_TEXT, GET_TABS_IMPORTANT_TAGS) and scope-aware filter
