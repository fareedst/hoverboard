ARCH-SIDE_PANEL_BROWSER_TABS:
  name: Side Panel Browser Tabs Architecture
  status: Active
  cross_references:
    - REQ-SIDE_PANEL_BROWSER_TABS
  rationale:
    why: New panel lists browser tabs from chrome.tabs; referrer must be fetched by the service worker so scripting runs in tab context; filter and actions operate on visible list.
    problems_solved:
      - How to get referrer (not in chrome.tabs API)
      - Scripting from the side panel does not run in tab context; injection must be done from the service worker
      - How to scope copy/close to filtered list
    benefits:
      - 'Single panel #browserTabsPanel; data from chrome.tabs; referrer via GET_TAB_REFERRERS; search scope Tab info / Page text / Important tags via GET_TABS_PAGE_TEXT and GET_TABS_IMPORTANT_TAGS (SW executeScript per tab); scope-aware filter and actions on visible tabs; batch bookmark actions (set/clear to-read, add tags) using existing getCurrentBookmark and saveBookmark; create bookmark only when needed (set to-read, add tags), not for clear to-read'
  implementation_approach:
    summary: 'Panel uses chrome.tabs.query; scope is chosen by user (Current window default, or All windows). Referrer via GET_TAB_REFERRERS (SW executeScript per tab). Search scope: user selects Tab info (title/url/referrer), Page text (body), or Important tags (alt, h1–h3, meta, etc.); GET_TABS_PAGE_TEXT and GET_TABS_IMPORTANT_TAGS return tabId-to-string maps via SW executeScript; fetch when scope is selected or on load. Filter is scope-aware; loading state during fetch. List display mode: single panel-level control (title | url | block, default block) chooses what each item shows. In title or url mode the displayed text is clickable to focus that window and tab (same as ids line in block); remove icon appears after the text. In block mode remove icon is before the Tags line. Session-scoped hidden-tab set: remove icon adds tab id to hidden set and re-renders; Refresh clears hidden set and reloads so all tabs can reappear. Copy URLs, copy records as YAML, close act on visible (filtered) list. Batch bookmark actions: Set to-read (getCurrentBookmark per tab first; if bookmark exists merge toread and save to preserve tags; else create); Clear to-read (getBookmark per tab, saveBookmark only if bookmark exists); Add tags (getBookmark per tab, merge tags and save, or create bookmark with tags if missing; use reply.data.url for create). Service worker returns processMessage response as-is so getCurrentBookmark reply.data has url and exists in panel; handler returns plain dataOut for structured clone. Focus on click: window/tab id line is clickable; on click use chrome.windows.update(windowId, { focused: true }) then chrome.tabs.update(tabId, { active: true }) to make window and tab visible. Bookmark tags per row: fetch via getCurrentBookmark (or batch getTagsForUrls if added); display tags in each card; same source as popup (url-tags-manager). Panel controls are grouped into sections (Scope, Filter & display, Batch bookmark, List actions, Window actions). Each control has a tooltip (title/aria-label). Each list item shows the tab favicon (from chrome.tabs favIconUrl). Important-tag sources are configurable via a text control; panel sends importantTagSources in GET_TABS_IMPORTANT_TAGS; SW injectable accepts args and collects only those DOM sources. Gather: chrome.tabs.move(displayed tabs not in current window to current window). Distribute: chrome.windows.create({ tabId }) for each displayed tab whose window has more than one tab.'
  traceability:
    requirements:
      - REQ-SIDE_PANEL_BROWSER_TABS
    implementation:
      - IMPL-SIDE_PANEL_BROWSER_TABS
    tests:
      - tests/unit/browser-tabs-panel.test.js
      - tests/unit/service-worker-messaging-routing.test.js
    code_annotations:
      - ARCH-SIDE_PANEL_BROWSER_TABS
  related_decisions:
    depends_on:
      - REQ-SIDE_PANEL_BROWSER_TABS
    informs:
      - IMPL-SIDE_PANEL_BROWSER_TABS
    see_also:
      - ARCH-SIDE_PANEL_TABS
  metadata:
    created:
      date: '2026-02-28'
      author: AI Agent
    last_updated:
      date: '2026-03-01'
      author: AI Agent
      reason: Sections, tooltips, favicon, configurable important-tag sources (message payload + SW args), Gather/Distribute (tabs.move, windows.create)
