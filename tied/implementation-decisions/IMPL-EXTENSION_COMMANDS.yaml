# [IMPL-EXTENSION_COMMANDS] [ARCH-QUICK_ACCESS_ENTRY] [REQ-QUICK_ACCESS_ENTRY]
# Implementation: Manifest commands + SW onCommand; four commands open side panel, options, bookmarks index, import.
IMPL-EXTENSION_COMMANDS:
  name: Extension Commands for Quick Access
  status: Active
  cross_references:
    - ARCH-QUICK_ACCESS_ENTRY
    - REQ-QUICK_ACCESS_ENTRY
  rationale:
    why: Implements REQ-QUICK_ACCESS_ENTRY and ARCH-QUICK_ACCESS_ENTRY by providing global keyboard shortcuts that open the four targets; user can customize in chrome://extensions/shortcuts.
    problems_solved:
      - No keyboard shortcut to open side panel, options, bookmarks index, or import without opening popup first
    benefits:
      - Four commands; SW handles onCommand; reuse _sidePanelWindowId for side panel; openOptionsPage and tabs.create for others
  implementation_approach:
    summary: 'manifest.json "commands" with open-side-panel, open-side-panel-bookmark, open-side-panel-tags-tree, open-side-panel-browser-tabs, open-options, open-bookmarks-index, open-import. Exactly four commands have suggested_key (Chrome limit): the three side-panel tab commands and open-bookmarks-index; all others have no suggested_key. SW handleCommand switches on command; for tab-specific commands set storage then sidePanel.open; side panel listens for storage.onChanged to switch tab when already open.'
    details:
      - 'manifest commands: open-side-panel (no suggested_key), open-side-panel-bookmark (Ctrl+Shift+1), open-side-panel-tags-tree (Ctrl+Shift+2), open-side-panel-browser-tabs (Ctrl+Shift+3), open-options (no suggested_key), open-bookmarks-index (Ctrl+Shift+B), open-import (no suggested_key). Exactly four suggested_key per Chrome limit.'
      - 'SW handleCommand: open-side-panel: sidePanel.open; open-side-panel-bookmark/tags-tree/browser-tabs: set chrome.storage.local hoverboard_sidepanel_active_tab to ''bookmark''|''tagsTree''|''browserTabs'', then sidePanel.open; open-options: openOptionsPage; open-bookmarks-index and open-import: tabs.create with getURL.'
      - 'Side panel: chrome.storage.onChanged for SIDE_PANEL_TAB_STORAGE_KEY; on change call switchTab(newValue) so when panel is already open and user triggers tab command, visible tab updates.'
  code_locations:
    files:
      - path: manifest.json
        description: commands key with four command definitions and suggested_key
      - path: src/core/service-worker.js
        description: chrome.commands.onCommand.addListener; switch on command; open side panel, options, bookmarks index, import
    functions: []
  essence_pseudocode: |
    # [IMPL-EXTENSION_COMMANDS] [ARCH-QUICK_ACCESS_ENTRY] [REQ-QUICK_ACCESS_ENTRY]
    # Extension commands for quick access; SW owns command handling.
    # Contract: shortcut in; one of four targets opens.
    INPUT: user presses assigned shortcut (or default Ctrl+Shift+B/O/M/I)
    OUTPUT: side panel opens, or options page opens, or bookmarks index tab opens, or import page tab opens
    DATA: command names (open-side-panel, open-options, open-bookmarks-index, open-import); SW onCommand handler

    # [REQ-QUICK_ACCESS_ENTRY] [ARCH-QUICK_ACCESS_ENTRY] [IMPL-EXTENSION_COMMANDS]
    # Manifest: four commands so Chrome shows them in chrome://extensions/shortcuts; user can reassign.
    manifest.json:
      "commands": {
        "open-side-panel": { "suggested_key": { "default": "Ctrl+Shift+B" }, "description": "Open Hoverboard side panel" },
        "open-options": { "suggested_key": { "default": "Ctrl+Shift+O" }, "description": "Open Hoverboard options" },
        "open-bookmarks-index": { "suggested_key": { "default": "Ctrl+Shift+M" }, "description": "Open bookmarks index" },
        "open-import": { "suggested_key": { "default": "Ctrl+Shift+I" }, "description": "Open browser bookmark import" }
      }

    # [REQ-QUICK_ACCESS_ENTRY] [ARCH-QUICK_ACCESS_ENTRY] [IMPL-EXTENSION_COMMANDS]
    # SW onCommand: handle each command; side panel via _sidePanelWindowId; openOptionsPage and tabs.create for options, index, import.
    SW setupEventListeners (or init):
      IF chrome.commands THEN chrome.commands.onCommand.addListener((command) => handleCommand(command))
    handleCommand(command):
      SWITCH command:
        "open-side-panel": windowId = this._sidePanelWindowId; IF windowId != null AND chrome.sidePanel?.open THEN chrome.sidePanel.open({ windowId })
        "open-side-panel-bookmark": chrome.storage.local.set({ hoverboard_sidepanel_active_tab: 'bookmark' }); THEN sidePanel.open({ windowId })
        "open-side-panel-tags-tree": chrome.storage.local.set({ hoverboard_sidepanel_active_tab: 'tagsTree' }); THEN sidePanel.open({ windowId })
        "open-side-panel-browser-tabs": chrome.storage.local.set({ hoverboard_sidepanel_active_tab: 'browserTabs' }); THEN sidePanel.open({ windowId })
        "open-options": chrome.runtime.openOptionsPage()
        "open-bookmarks-index": chrome.tabs.create({ url: ... bookmarks-table.html })
        "open-import": chrome.tabs.create({ url: ... browser-bookmark-import.html })
    # Side panel: storage.onChanged for SIDE_PANEL_TAB_STORAGE_KEY → switchTab(newValue) when panel already open.
