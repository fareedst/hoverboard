IMPL-SIDE_PANEL_BROWSER_BOOKMARKS:
  name: Side Panel Browser Bookmarks Implementation
  status: Active
  cross_references:
    - ARCH-SIDE_PANEL_BROWSER_BOOKMARKS
    - REQ-SIDE_PANEL_BROWSER_BOOKMARKS
  rationale:
    why: Implements ARCH-SIDE_PANEL_BROWSER_BOOKMARKS and REQ-SIDE_PANEL_BROWSER_BOOKMARKS with flatten, filter, folder tree, and panel UI.
    problems_solved:
      - No browser bookmarks list in side panel
    benefits:
      - Testable filterBrowserBookmarks, flattenBookmarkTree, buildFolderTree; panel with list, search, folder filter, click to open
  implementation_approach:
    summary: Panel fetches chrome.bookmarks.getTree; flatten to list; build folder tree with counts; filter by query and folder; render list; click URL opens in new tab.
    details:
      - Data fetch: chrome.bookmarks.getTree in panel; flattenBookmarkTree(nodes, parentPath) returns flat list with id, url, title, dateAdded, folderPath, parentId
      - Folder tree: buildFolderTree(nodes, parentPath) returns tree of { id, title, path, count, children }; count = direct bookmarks in folder
      - Filter: filterBrowserBookmarks(bookmarks, query, folderId) pure; empty query returns all; folderId filters by parentId; case-insensitive substring on title, url, folderPath
      - Sort: sortBrowserBookmarks(bookmarks, sortBy, sortAsc) pure; sortBy in date|name|default; sortAsc boolean; persisted in chrome.storage.local (hoverboard_browser_bookmarks_sort)
      - UI: search input; folder dropdown; sort dropdown (date-desc, date-asc, name-asc, name-desc, default); list section; match count; each row shows favicon (chrome favicon API or fallback), title, url, folder path; click url opens chrome.tabs.create
      - Panel layout: same as Tags tree and Browser Tabs; above-list scrolls off; list section fills height; bulk (selectedIds, getSelectedBookmarks, updateBulkButtonStates); undo (undoStack, showUndoMessage); import/export (parseBookmarksHtml/Csv, buildBookmarksHtml/Csv, downloadBlob); inline edit (startInlineEdit, finishEdit); keyboard (setupKeyboardShortcuts, handleBookmarksKeydown); command (manifest open-side-panel-browser-bookmarks)
  code_locations:
    files:
      - path: src/ui/side-panel/browser-bookmarks-panel.js
        description: flattenBookmarkTree, filterBrowserBookmarks, buildFolderTree, sortBrowserBookmarks, build/parse Html/Csv, getFaviconSrc, buildUrlListForCopy; init, render, bulk, undo, import/export, inline edit, keyboard
      - path: src/ui/side-panel/side-panel.html
        description: Tab button and #browserBookmarksPanel
      - path: src/ui/side-panel/side-panel.js
        description: initBrowserBookmarksTab wiring
      - path: src/ui/side-panel/side-panel-tab-state.js
        description: TAB_BROWSER_BOOKMARKS constant and visibility
    functions:
      - name: flattenBookmarkTree
        file: src/ui/side-panel/browser-bookmarks-panel.js
        description: Recursively flatten chrome bookmarks tree to list with folderPath
      - name: filterBrowserBookmarks
        file: src/ui/side-panel/browser-bookmarks-panel.js
        description: Pure filter by query (title, url, folderPath) and folderId (parentId); case-insensitive
      - name: buildFolderTree
        file: src/ui/side-panel/browser-bookmarks-panel.js
        description: Build folder hierarchy with bookmark counts per folder
      - name: sortBrowserBookmarks
        file: src/ui/side-panel/browser-bookmarks-panel.js
        description: Sort bookmarks by date, name, or default (tree order)
      - name: getSelectedBookmarks
        file: src/ui/side-panel/browser-bookmarks-panel.js
        description: Returns selected bookmarks from lastVisible (internal; testable via behavior)
