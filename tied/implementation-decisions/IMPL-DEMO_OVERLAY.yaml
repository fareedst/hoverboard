  name: Demo Recording Overlay
  status: Active
  cross_references:
    - PROC-DEMO_RECORDING
    - REQ-SIDE_PANEL_BROWSER_TABS
    - REQ-SIDE_PANEL_POPUP_EQUIVALENT
    - REQ-SIDE_PANEL_TAGS_TREE
    - REQ-SIDE_PANEL_BOOKMARK_SEARCH
    - REQ-MOVE_BOOKMARK_STORAGE_UI
    - REQ-RECENT_TAGS_SYSTEM
    - REQ-SUGGESTED_TAGS_FROM_CONTENT
    - REQ-AI_TAGGING_POPUP
    - IMPL-SIDE_PANEL_BROWSER_TABS
    - IMPL-SIDE_PANEL_BOOKMARK
    - IMPL-SIDE_PANEL_TAGS_TREE
    - REQ-SIDE_PANEL_BROWSER_BOOKMARKS
    - IMPL-SIDE_PANEL_BROWSER_BOOKMARKS
    - REQ-BOOKMARK_USAGE_TRACKING
    - IMPL-BOOKMARK_USAGE_TRACKING_UI
  rationale:
    why: Implements PROC-DEMO_RECORDING overlay styling for Tabs demo; position, text size, and class-based colors so key-frame annotations are visible and semantically distinct.
    problems_solved:
      - Overlay at bottom obscures content
      - Single text style for all steps
      - No visual distinction between action vs result
    benefits:
      - Overlay at top; larger text; five text classes (intro, navigation, state, action, result) with distinct colors
  implementation_approach:
    summary: Overlay fixed at top of viewport; font 18-20px; setOverlay(action, achievement, textClass); five classes with assigned colors; 12 steps mapped to classes.
    details:
      - Position: fixed at top (top:0), full width; background rgba(0,0,0,0.72).
      - Font: system-ui, 18px or 20px; line-height 1.4; padding 8px 12px.
      - setOverlay(action, achievement, textClass): create or reuse
      - OVERLAY_CLASSES: intro
      - Step mapping: 1-2 intro; 3-4 navigation; 5-6,8 state; 7,9,11 action; 10,12 result.
      - Demo also shows display mode (Title then Block), remove-from-display, and Refresh; steps 5a/5b and 8a/8b in record-demo-side-panel-tabs.js.
      - Bookmark demo (record-demo-side-panel-this-page.js): highlightElement(selector) and clearHighlight() apply outline/box-shadow to first element matching selector inside
  demo_gif_standard:
    summary: Timing, interstitial, opacity, and GIF build rules so all side-panel demo GIFs are consistent and loop-friendly.
    timing:
      - 'Start: 1 s with no overlay (removeOverlay, wait 1000*RATE ms, one snap = frame 0). First frame is a useful static image.'
      - 'Presentation rate: RATE = 1.25 (25% slower); multiply all wait durations by RATE.'
      - 'Before interstitial: 0.5 s pause (wait 500*RATE ms) after the last content step, then inject logo and snap.'
      - 'Interstitial in GIF: last frame duration 0.5 s (Hoverboard icon centered).'
    overlay:
      - 'Header background: rgba(0,0,0,0.78) (slightly more opaque than default 0.72).'
      - 'Descriptions: 30–50% longer overlay text (action + achievement) for context.'
    interstitial:
      - Once per loop, at end only (no intro logo so the first frame remains a useful static image).
      - Full-screen overlay with Hoverboard icon (e.g. chrome.runtime.getURL('icons/hoverboard_128.png')) centered.
      - Capture one frame; in GIF build give that frame 0.5 s duration.
    gif_build:
      - '3-part structure: (1) No-overlay segment from frame 0, duration 1 s. (2) Main segment from overlay steps, 1 fps per frame. (3) End segment from last frame (logo), duration 0.5 s.'
      - Use concat filter + re-encode to output GIF. Do not use concat demuxer with -c copy (can yield single-frame output).
      - Palette from all frames; build nooverlay.gif, main.gif, end.gif; merge with filter e.g. [0:v][1:v][2:v]concat=n=3:v=1:a=0, then -c:v gif.
    reference_script: scripts/record-demo-side-panel-bookmarks.js
  code_locations:
    files:
      - path: scripts/record-demo-side-panel-tabs.js
        description: '[IMPL-DEMO_OVERLAY] [REQ-SIDE_PANEL_BROWSER_TABS] setOverlay (header rgba 0.78), removeOverlay, highlightElement/clearHighlight; optional persist hoverboard_sidepanel_active_tab=browserTabs; 1s no overlay at start (frame 0), then overlay steps; end card (0.5s pause, logo frame); 3-part ffmpeg concat (no-overlay 1s, main 1fps, end 0.5s); RATE 1.25; descriptions 30-50% longer; per-step highlight (tab bar, #browserTabsPanel).'
      - path: scripts/record-demo-side-panel-this-page.js
        description: '[IMPL-DEMO_OVERLAY] [REQ-SIDE_PANEL_POPUP_EQUIVALENT] [IMPL-SIDE_PANEL_BOOKMARK] setOverlay (header rgba 0.78), removeOverlay, highlightElement/clearHighlight scoped to #bookmarkPanel; 1s no overlay at start (frame 0 = useful static image), then overlay steps (Quick Actions, Save to, Tag with AI, Recent Tags, Suggested Tags, Search Tabs, Footer); end card (0.5s pause then Hoverboard icon centered, frame N-1, 0.5s in GIF); 3-part ffmpeg concat (no-overlay 1s, main 1fps, end 0.5s); RATE 1.25; descriptions 30-50% longer.'
      - path: scripts/record-demo-side-panel-by-tag.js
        description: '[IMPL-DEMO_OVERLAY] [REQ-SIDE_PANEL_TAGS_TREE] [IMPL-SIDE_PANEL_TAGS_TREE] persist hoverboard_sidepanel_active_tab=tagsTree before opening; 1s no overlay at start (frame 0 = By Tag visible); setOverlay (header rgba 0.78), removeOverlay, highlightElement/clearHighlight scoped to #tagsTreePanel; steps (By Tag loaded, Filtering by tag, Tree updated, Search bookmarks, Match count, Click URL); end card (0.5s pause then Hoverboard icon, frame N-1); 3-part ffmpeg concat (no-overlay 1s, main 1fps, end 0.5s); RATE 1.25; descriptions 30-50% longer.'
      - path: scripts/record-demo-side-panel-bookmarks.js
        description: '[IMPL-DEMO_OVERLAY] [REQ-SIDE_PANEL_BROWSER_BOOKMARKS] setOverlay (header rgba 0.78), removeOverlay, highlightElement/clearHighlight scoped to #browserBookmarksPanel; persist hoverboard_sidepanel_active_tab=browserBookmarks before opening panel; 1s no overlay at start (frame 0 = useful static image), then overlay steps (Viewing Bookmarks tab, list, search, folder, sort, count, click URL); end card (0.5s pause then Hoverboard icon centered, frame N-1, 0.5s in GIF); 3-part ffmpeg concat (no-overlay 1s, main 1fps, end 0.5s); overlay text 30-50% longer; RATE 1.25x; seed bookmarks then open side panel.'
      - path: scripts/record-demo-side-panel-usage.js
        description: '[IMPL-DEMO_OVERLAY] [REQ-BOOKMARK_USAGE_TRACKING] [IMPL-BOOKMARK_USAGE_TRACKING_UI] setOverlay (header rgba 0.78), removeOverlay, highlightElement/clearHighlight scoped to #usagePanel; persist hoverboard_sidepanel_active_tab=usage before opening panel; 1s no overlay at start (frame 0 = useful static image), then overlay steps (Viewing Usage tab, Most Visited, Recently Visited, Refresh, Navigation Graph); end card (0.5s pause then Hoverboard icon centered, frame N-1, 0.5s in GIF); 3-part ffmpeg concat (no-overlay 1s, main 1fps, end 0.5s); RATE 1.25; descriptions 30-50% longer.'
