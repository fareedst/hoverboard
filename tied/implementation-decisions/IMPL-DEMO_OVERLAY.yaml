      - REQ-BOOKMARK_USAGE_TRACKING
    tests:
      - 'extension-messaging.spec.js: side panel opens with Bookmarks tab visible when hoverboard_sidepanel_active_tab is set'
      - 'extension-messaging.spec.js: side panel opens with Tabs tab visible when hoverboard_sidepanel_active_tab is set to browserTabs'
      - 'extension-messaging.spec.js: side panel opens with By Tag tab visible when hoverboard_sidepanel_active_tab is set to tagsTree'
      - 'extension-demo-tabs.spec.js: Tabs tab open panel switch to Tabs wait for list optional filter Copy Records'
      - 'extension-demo-tabs.spec.js: Tabs panel shows filter and Copy Records when opened with hoverboard_sidepanel_active_tab=browserTabs'
