# [IMPL-ICON_CLICK_BEHAVIOR] [ARCH-ICON_CLICK_BEHAVIOR] [REQ-ICON_CLICK_BEHAVIOR]
# Implementation: Remove default_popup; SW action.onClicked; config iconClickOpensSidePanel; options toggle.
IMPL-ICON_CLICK_BEHAVIOR:
  name: Extension Icon Single-Click Behavior
  status: Active
  cross_references:
    - ARCH-ICON_CLICK_BEHAVIOR
    - REQ-ICON_CLICK_BEHAVIOR
  rationale:
    why: Implements REQ-ICON_CLICK_BEHAVIOR and ARCH-ICON_CLICK_BEHAVIOR so that icon click opens side panel by default or popup when user chooses.
    problems_solved:
      - Icon always opened popup; no way to open side panel on click
    benefits:
      - Default side panel on click; options toggle to open popup instead; config persisted
  implementation_approach:
    summary: manifest.json action has no default_popup; ConfigManager has iconClickOpensSidePanel (default true); options page has toggle; SW caches preference and _sidePanelWindowId; action.onClicked.addListener((tab) => handleActionClick(tab)); handleActionClick(tab) uses clickedWindowId = tab?.windowId, useWindowId = clickedWindowId ?? cachedWindowId, calls sidePanel.open({ windowId: useWindowId }) synchronously; when clickedWindowId is set and tab URL is not restricted, set _sidePanelWindowId = clickedWindowId; cold start (no tab, no cache) seeds cache via tabs.query and openPopup only. Commands/context menu/OPEN_SIDE_PANEL use _openSidePanelWithFallback() (cached or cold-start).
    details:
      - 'manifest.json: remove action.default_popup (keep default_icon, default_title)'
      - 'ConfigManager: getDefaultConfiguration() add iconClickOpensSidePanel: true; mergedConfigSchema add iconClickOpensSidePanel: z.boolean().optional()'
      - 'Options: new control (e.g. checkbox id icon-click-opens-side-panel); loadSettings/saveSettings read and write the key'
      - 'SW: _iconClickOpensSidePanel cache; _seedIconClickPreferenceCache() at startup and on storage.onChanged(hoverboard_settings); action.onClicked.addListener((tab) => handleActionClick(tab)); handleActionClick(tab) uses clickedWindowId = tab?.windowId, useWindowId = clickedWindowId ?? cachedWindowId, calls sidePanel.open({ windowId: useWindowId }) synchronously (Chrome user-gesture requirement); when clickedWindowId present and tab URL not restricted, set _sidePanelWindowId = clickedWindowId; then windows.update(useWindowId, { focused: true }), sendMessage(REQUEST_SIDE_PANEL_CLOSE). Cold start (no tab, no cache): tabs.query({ active: true, currentWindow: true }, cb) to seed cache only, action.openPopup() (do not call sidePanel.open in callback—gesture is lost). Commands/context menu/OPEN_SIDE_PANEL use _openSidePanelWithFallback().'
      - 'Side panel: _sidePanelLoadTime at script load; bindToggleCloseRequest() listens for REQUEST_SIDE_PANEL_CLOSE; if visibilityState === ''visible'' and (now - loadTime) > 300ms then window.close()'
  code_locations:
    files:
      - path: manifest.json
        description: remove default_popup
      - path: src/config/config-manager.js
        description: default and schema for iconClickOpensSidePanel
      - path: src/ui/options/options.html
        description: toggle UI
      - path: src/ui/options/options.js
        description: bind and load/save toggle
      - path: src/core/service-worker.js
        description: handleActionClick(tab) takes clicked tab from onClicked and prefers its windowId; synchronous sidePanel.open(useWindowId); cold start seeds cache and openPopup only; _openSidePanelWithFallback for commands/menu/OPEN_SIDE_PANEL
      - path: src/ui/side-panel/side-panel.js
        description: bindToggleCloseRequest, REQUEST_SIDE_PANEL_CLOSE listener and window.close
      - path: src/core/message-handler.js
        description: MESSAGE_TYPES.REQUEST_SIDE_PANEL_CLOSE
  essence_pseudocode: |
    # [IMPL-ICON_CLICK_BEHAVIOR] [ARCH-ICON_CLICK_BEHAVIOR] [REQ-ICON_CLICK_BEHAVIOR]
    # Icon click opens side panel (default) or popup; when side panel, click toggles (close if already open).
    INPUT: user clicks extension toolbar icon
    OUTPUT: side panel opens or closes (toggle) when option enabled; else popup opens
    DATA: SW _iconClickOpensSidePanel (cached), _sidePanelWindowId; panel _sidePanelLoadTime; MESSAGE_TYPES.REQUEST_SIDE_PANEL_CLOSE

    # [REQ-ICON_CLICK_BEHAVIOR] [ARCH-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # Manifest: no default_popup so onClicked fires.
    manifest action: default_icon, default_title; no default_popup

    # [REQ-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # Config: iconClickOpensSidePanel default true; schema optional boolean.
    getDefaultConfiguration(): iconClickOpensSidePanel: true
    mergedConfigSchema: iconClickOpensSidePanel: z.boolean().optional()

    # [REQ-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # Options: toggle bound to iconClickOpensSidePanel; load and save with other settings.
    loadSettings: set checkbox from config.iconClickOpensSidePanel
    saveSettings: include iconClickOpensSidePanel from checkbox in updateConfig

    # [REQ-ICON_CLICK_BEHAVIOR] [ARCH-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # SW: cache preference so handler stays synchronous (user gesture required for sidePanel.open).
    _seedIconClickPreferenceCache():
      getConfig().then(c => this._iconClickOpensSidePanel = c.iconClickOpensSidePanel)
      storage.onChanged.addListener(changes, areaName => IF areaName === 'local' AND changes.hoverboard_settings THEN getConfig().then(...))

    # [REQ-ICON_CLICK_BEHAVIOR] [ARCH-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # SW: listener passes tab from Chrome into handleActionClick(tab).
    action.onClicked.addListener((tab) => handleActionClick(tab))

    # [REQ-ICON_CLICK_BEHAVIOR] [ARCH-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # SW handleActionClick(tab): prefer clicked window; Chrome requires sidePanel.open() in same synchronous user-gesture stack.
    handleActionClick(tab):
      openSidePanel = (this._iconClickOpensSidePanel !== false)
      IF NOT openSidePanel: action.openPopup(); RETURN
      IF NOT sidePanel.open available: action.openPopup(); RETURN
      # [IMPL-ICON_CLICK_BEHAVIOR] Prefer clicked window: use tab from onClicked when provided, else cache.
      clickedWindowId = tab?.windowId != null ? tab.windowId : null
      cachedWindowId = this._sidePanelWindowId
      useWindowId = clickedWindowId != null ? clickedWindowId : cachedWindowId
      IF useWindowId != null:
        IF clickedWindowId != null AND NOT _isRestrictedForSidePanel(tab?.url): this._sidePanelWindowId = clickedWindowId
        sidePanel.open({ windowId: useWindowId }); windows.update(useWindowId, { focused: true }); sendMessage(REQUEST_SIDE_PANEL_CLOSE); RETURN
      # [IMPL-ICON_CLICK_BEHAVIOR] Cold start: no tab and no cache; do NOT call sidePanel.open in async callback (gesture would be lost). Seed cache for next click; open popup as fallback.
      tabs.query({ active: true, currentWindow: true }, (tabs) =>
        tabFromQuery = tabs?.[0]
        IF tabFromQuery?.windowId != null AND NOT _isRestrictedForSidePanel(tabFromQuery.url): this._sidePanelWindowId = tabFromQuery.windowId
      )
      action.openPopup()

    # [REQ-ICON_CLICK_BEHAVIOR] [IMPL-ICON_CLICK_BEHAVIOR]
    # Side panel: on REQUEST_SIDE_PANEL_CLOSE close if visible and open long enough (toggle).
    bindToggleCloseRequest():
      runtime.onMessage.addListener(message =>
        IF message?.type !== REQUEST_SIDE_PANEL_CLOSE RETURN
        IF document.visibilityState !== 'visible' RETURN
        IF (Date.now() - _sidePanelLoadTime) < 300 RETURN
        window.close())
