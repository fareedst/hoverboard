    code_annotations:
      - IMPL-ICON_CLICK_BEHAVIOR
      - REQ-ICON_CLICK_BEHAVIOR
  e2e_recommendations:
    - 'Icon click opens side panel: with extension loaded, simulate toolbar icon click (e.g. CDP or chrome.action API from test context) and assert side panel becomes visible or side-panel page is focused.'
    - 'Icon click correct window: ensured by using the tab Chrome passes to action.onClicked; unit test covers handleActionClick(tab) with tab.windowId differing from cache. E2E cannot simulate toolbar click per-window; existing OPEN_SIDE_PANEL / cold-start E2E (extension-icon-click.spec.js) remains the recommended coverage.'
    - 'Icon click cold-start: immediately after browser/extension load (before navigating), click extension icon and assert side panel opens (validates tabs.query callback when _sidePanelWindowId is null).'
    - 'Icon click toggles (closes) side panel: open side panel (e.g. via command or direct URL), wait >400ms, simulate icon click again and assert panel closes (e.g. side panel page/window no longer visible).'
    - 'Options toggle: load options page, set ''Single click opens popup'', save; simulate icon click and assert popup opens (e.g. popup URL in a new page) instead of side panel.'
    - 'Suggested location: tests/playwright/extension-icon-click.spec.js or extend extension-messaging.spec.js; use same unpacked-extension fixture as other extension E2E.'
  related_decisions:
    depends_on:
      - ARCH-ICON_CLICK_BEHAVIOR
      - REQ-ICON_CLICK_BEHAVIOR
    supersedes: []
    see_also:
      - IMPL-EXTENSION_COMMANDS
