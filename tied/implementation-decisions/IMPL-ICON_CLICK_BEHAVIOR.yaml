    created:
      date: '2026-03-02'
      author: AI Agent
    last_updated:
      date: '2026-03-02'
      author: AI Agent
      reason: Toggle behavior (REQUEST_SIDE_PANEL_CLOSE, panel close when visible); sync handler and cache; pseudo-code and e2e_recommendations
