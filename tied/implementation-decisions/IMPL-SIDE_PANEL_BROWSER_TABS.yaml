IMPL-SIDE_PANEL_BROWSER_TABS:
  name: Side Panel Browser Tabs Implementation
  status: Active
  cross_references:
    - ARCH-SIDE_PANEL_BROWSER_TABS
    - REQ-SIDE_PANEL_BROWSER_TABS
  rationale:
    why: Implements ARCH-SIDE_PANEL_BROWSER_TABS and REQ-SIDE_PANEL_BROWSER_TABS with filter, copy, close and panel UI.
    problems_solved:
      - No browser tabs list in side panel
    benefits:
      - Testable filterBrowserTabs; panel with list, filter, copy URLs, close with confirm
  implementation_approach:
    details:
      - 'Data fetch: chrome.tabs.query in panel; windowScope (currentWindow | all); referrer via GET_TAB_REFERRERS (SW executeScript per tab). Search scope: tabInfo (default), pageText, importantTags. When scope is pageText or importantTags, panel sends GET_TABS_PAGE_TEXT or GET_TABS_IMPORTANT_TAGS with tab list; SW runs executeScript per tab (injectable returns title+body.innerText capped, or concatenated alt/h1–h3/meta/og:title/etc.); panel merges map into allTabs as pageText/importantTags. Show loading state during fetch.'
      - 'UI: window scope toggle; search-scope control (Tab info | Page text | Important elements, default Tab info); search input; control groups with very narrow margins; Title/URL/Block line kept above filter textbox; checkbox ''Important elements'' adjacent to DOM sources textbox (when checked use textbox list, when unchecked use default); filter is scope-aware (filterBrowserTabs(tabs, query, scope)); multi-row card per tab; visible = filtered list'
      - Copy: collect URLs of visible tabs, clipboard.writeText(urls.join("\n")), show count
      - Copy Records: build YAML list from visible tabs (each item id, windowId, title, url, referrer), clipboard.writeText(yamlString), show "Copied N records"
      - Close: confirm("Close N tabs?"); on confirm chrome.tabs.remove for each visible id; show success count
      - 'Panel layout (same as Tags tree): #browserTabsPanel is the scroll container; first child .browser-tabs-above-list (flex: none) contains header, window scope, search scope, filter input, message, bookmark batch UI (tags input + Add tags, Set to-read, Clear to-read), actions (Copy URLs, Copy Records, Close); second child .browser-tabs-list-section (min-height: 100%, overflow-y: auto) contains #browserTabsList. The above block scrolls off so the list section fills visible height and scrolls its contents.'
      - 'Batch bookmark UI: section .browser-tabs-bookmark-actions with label Tags, input #browserTabsTagsInput (placeholder tag1, tag2), button Add tags; button Set to-read; button Clear to-read. All act on visibleTabs; only http(s) URLs are processed. Set to-read: getCurrentBookmark(url) per tab; if reply.data.exists and reply.data.url then saveBookmark({ ...reply.data, toread: ''yes'' }) to preserve tags; else create with urlToSave (reply.data.url || tabUrl), description, toread: ''yes'', tags: [], preferredBackend. Clear to-read: getCurrentBookmark(url) per tab; if reply.success and reply.data and not blocked and reply.data.exists then saveBookmark({ ...reply.data, toread: ''no'' }); else skip. Add tags: parseTagsInput(input); for each tab getCurrentBookmark(url); guard reply.success and reply.data and reply.data.url and not blocked; if exists use buildAddTagsPayload(reply.data, newTags) and saveBookmark; else saveBookmark with urlToSave = reply.data.url || tabUrl, description, tags: newTags, preferredBackend. Reuse parseTagsInput, buildAddTagsPayload from bookmarks-table-filter.js. Service worker returns processMessage response as-is (no double-wrap) so reply.data.url and reply.data.exists are present in panel. Message handler getCurrentBookmark returns plain dataOut object (url, exists, tags, etc.) so fields survive structured clone.'
      - 'Focus on click: In block mode, window/tab id line is a button with class browser-tabs-card-ids-link and data-window-id, data-tab-id. In title or url mode, the displayed text (title or URL) is a button with class browser-tabs-card-focus-link and data-window-id, data-tab-id so clicking it focuses that window and tab. On click (delegated on list): if .browser-tabs-card-ids-link or .browser-tabs-card-focus-link, read windowId and tabId; if both valid numeric, call chrome.windows.update(windowId, { focused: true }) then chrome.tabs.update(tabId, { active: true }). Optional: inject chromeWindows in init for testability.'
      - 'Bookmark tags per row: After building allTabs (with referrers), for each tab with http(s) URL call getCurrentBookmark({ url, title }); merge reply.data.tags into tab (e.g. tab.bookmarkTags). In RENDER, display line Tags: tag1, tag2 or — when empty. Parallel or sequential getCurrentBookmark acceptable; batch getTagsForUrls optional later.'
      - 'Close tagged: Button (e.g. data-action=closeTabsWithTag) closes only visible tabs where Array.isArray(tab.bookmarkTags) && tab.bookmarkTags.length > 0; confirm then chrome.tabs.remove each; then loadTabs().'
      - 'Close untagged: Button (e.g. data-action=closeTabsWithoutTag) closes only visible tabs where !tab.bookmarkTags || !Array.isArray(tab.bookmarkTags) || tab.bookmarkTags.length === 0; confirm then remove each; then loadTabs().'
      - 'Refresh: Button (e.g. data-action=refreshTabs) on click calls loadTabs() to re-query tabs, referrers, bookmark tags, re-apply filter, re-render.'
      - 'List display mode: DATA listDisplayMode = ''block'' | ''title'' | ''url'' (default ''block''). UI: radio group (e.g. name=browserTabsListDisplayMode) Show: Title | URL | Block. RENDER: per card, if title show clickable title (button .browser-tabs-card-title .browser-tabs-card-focus-link with data-window-id, data-tab-id when ids valid) then remove icon after; if url show clickable URL (button .browser-tabs-card-url .browser-tabs-card-focus-link) then remove icon after; if block show full card (title, url, referrer, ids, tags) with remove icon before Tags. ON display-mode change: set listDisplayMode, renderList().'
      - 'Remove from display: DATA hiddenTabIds = Set of tab IDs. Display list = visibleTabs.filter(t => !hiddenTabIds.has(t.id)); getDisplayedTabs() returns this list for copy/close/batch actions. Every card has remove icon (data-action=removeFromDisplay, data-tab-id): in title/url mode after the text, in block mode before the Tags line. ON remove icon click: hiddenTabIds.add(tabId); renderList(). ON Refresh: hiddenTabIds.clear(); then loadTabs() so all tabs can reappear.'
      - 'Recommended E2E (IMPL-SIDE_PANEL_BROWSER_TABS): open side panel and switch to Tabs tab; assert display mode control (Title | URL | Block) and list render; switch to Title mode and assert cards show only title and remove icon after text; switch to URL mode and assert cards show only URL and remove icon; switch back to Block and assert full card with remove before Tags; click remove on one card and assert it disappears from list; click Refresh and assert list repopulates (hidden set cleared); optionally in title or url mode click the focus link and assert active tab/window changes if test harness can verify focus.'
      - 'Sections: wrap controls in section elements with aria-label/class; inner control-group divs (class browser-tabs-control-group) with very narrow margins (e.g. 0.125rem). Order: Title/URL/Block above filter textbox, then Important elements row (checkbox + DOM sources textbox). Tooltips: every control has title (and aria-label where helpful). Favicon: preserve favIconUrl from chrome.tabs in allTabs; in renderList() add img.browser-tabs-card-favicon before title/url in all display modes; fallback when empty.'
      - 'Important elements: checkbox (id e.g. browserTabsUseCustomImportantSources) labeled ''Important elements'' adjacent to text input #browserTabsImportantTagSources in Filter & display section. When checkbox checked: use textbox value (parse to array); when unchecked: use default list. Default value of textbox comma-separated; persist textbox in chrome.storage.local (hoverboard_tabs_important_tag_sources). When sending GET_TABS_IMPORTANT_TAGS include data.importantTagSources from checkbox+textbox logic. SW: unchanged (accept importantTagSources; if missing/empty use default list).'
      - 'Gather: button data-action=gatherTabs; get current window ID (chrome.windows.getCurrent); for each tab in getDisplayedTabs() where tab.windowId !== currentWindowId call chrome.tabs.move(tab.id, { windowId: currentWindowId, index: -1 }); show message; loadTabs(). Distribute: button data-action=distributeTabs; for each tab in getDisplayedTabs() query chrome.tabs.query({ windowId: tab.windowId }); if length > 1 call chrome.windows.create({ tabId: tab.id }); show message; loadTabs().'
  code_locations:
    files:
      - path: src/ui/side-panel/browser-tabs-panel.js
        description: filter, copy list, close IDs; init and render; sendMessage GET_TAB_REFERRERS and merge referrer map
      - path: src/ui/side-panel/side-panel.html
        description: Tab button and #browserTabsPanel
      - path: src/core/service-worker.js
        description: GET_TAB_REFERRERS handler; executeScript per tab; handleMessage returns processMessage response as-is (no double-wrap) for getCurrentBookmark
      - path: src/core/message-handler.js
        description: GET_TAB_REFERRERS, GET_TABS_PAGE_TEXT, GET_TABS_IMPORTANT_TAGS; handleGetCurrentBookmark returns plain dataOut (url, exists, tags, etc.) for panel/SW contract
    functions:
      - name: filterBrowserTabs
        file: src/ui/side-panel/browser-tabs-panel.js
        description: 'Scope-aware filter (tabInfo: title/url/referrer; pageText: tab.pageText; importantTags: tab.importantTags); case-insensitive'
      - name: buildUrlListForCopy
        file: src/ui/side-panel/browser-tabs-panel.js
        description: Return URLs of visible tabs (one per line)
      - name: buildRecordsYamlForCopy
        file: src/ui/side-panel/browser-tabs-panel.js
        description: Return YAML string of full tab records (id, windowId, title, url, referrer) for clipboard
      - name: getDisplayedTabs
        file: src/ui/side-panel/browser-tabs-panel.js
        description: Return visibleTabs filtered by !hiddenTabIds.has(id); used for copy, close, batch actions and render
      - name: getFaviconSrc
        file: src/ui/side-panel/browser-tabs-panel.js
        description: Return tab.favIconUrl or placeholder data URI for img src; used in renderList for all display modes
      - name: GET_TAB_REFERRERS handler
        file: src/core/service-worker.js
        description: 'Handle getTabReferrers message; executeScript per tab; return { tabId: referrer }'
  traceability:
    architecture:
      - ARCH-SIDE_PANEL_BROWSER_TABS
    requirements:
      - REQ-SIDE_PANEL_BROWSER_TABS
    tests:
      - tests/unit/browser-tabs-panel.test.js
      - tests/unit/side-panel-tabs.test.js
      - tests/unit/service-worker-messaging-routing.test.js
    code_annotations:
      - IMPL-SIDE_PANEL_BROWSER_TABS
  related_decisions:
    depends_on:
      - ARCH-SIDE_PANEL_BROWSER_TABS
    supersedes: []
    see_also:
      - IMPL-SIDE_PANEL_TABS
    composed_with:
      - IMPL-SIDE_PANEL_TABS
  essence_pseudocode: |
    # [IMPL-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [REQ-SIDE_PANEL_BROWSER_TABS]
    # This block defines the browser tabs panel: data fetch, search scope, filter, UI, copy URLs, close with confirm. Implements REQ by listing tabs with title/URL/referrer and optional pageText/importantTags; scope-aware filter; implements ARCH by chrome.tabs + scripting and visible-list actions.

    INPUT: windowScope (currentWindow | all), searchScope (tabInfo | pageText | importantTags), searchQuery (string), tabs list from chrome.tabs
    OUTPUT: visible tabs (filtered), copy URLs to clipboard with count, close visible tabs after confirm with count
    DATA: tabs = [{ id, windowId, title, url, referrer, pageText?, importantTags? }], visibleTabs = filterBrowserTabs(tabs, searchQuery, searchScope)

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Data fetch: panel queries chrome.tabs; windowScope selects query. Referrer via GET_TAB_REFERRERS (SW executeScript per tab). When searchScope is pageText or importantTags, panel sends GET_TABS_PAGE_TEXT or GET_TABS_IMPORTANT_TAGS with tab list; SW executeScript per tab returns tabId→string map; panel merges into allTabs. Show loading state during pageText/importantTags fetch. Implements "list from current or all windows", "collect referrer", "search in page text or important tags".
    ON load / refresh (panel):
      queryOpts = (windowScope === 'currentWindow') ? { currentWindow: true } : {}
      list = AWAIT chrome.tabs.query(queryOpts)
      referrersMap = AWAIT sendMessage({ type: GET_TAB_REFERRERS, data: { tabs: list.map(t => ({ id: t.id, url: t.url })) } }) then response.data
      allTabs = list.map(tab => ({ ...tab, referrer: referrersMap[tab.id] ?? '' }))
      IF searchScope === 'pageText': showLoading(); pageTextMap = AWAIT sendMessage({ type: GET_TABS_PAGE_TEXT, data: { tabs: list } }) then response.data; merge pageTextMap into allTabs; hideLoading()
      IF searchScope === 'importantTags': showLoading(); importantTagsMap = AWAIT sendMessage({ type: GET_TABS_IMPORTANT_TAGS, data: { tabs: list } }) then response.data; merge importantTagsMap into allTabs; hideLoading()
    ON GET_TAB_REFERRERS (service worker): FOR each tab WHERE url is http(s): executeScript({ target: { tabId }, func: () => document.referrer || '' }) → referrers[tab.id]; RETURN { success: true, data: referrers }
    ON GET_TABS_PAGE_TEXT (service worker): FOR each tab WHERE url is http(s): executeScript({ target: { tabId }, func: () => { const t = (document.title||'').trim(); const b = (document.body&&document.body.innerText) ? String(document.body.innerText).trim().slice(0,16000) : ''; return t + ' ' + b; } }) → map[tab.id] = result; RETURN { success: true, data: map }
    ON GET_TABS_IMPORTANT_TAGS (service worker): FOR each tab WHERE url is http(s): executeScript({ target: { tabId }, func: injectableCollectImportantTags }) → map[tab.id] = result; RETURN { success: true, data: map }

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # filterBrowserTabs(tabs, query, scope): pure function. Empty query returns all. scope tabInfo → match title, url, referrer; scope pageText → match tab.pageText; scope importantTags → match tab.importantTags. Case-insensitive substring. Implements "filter by search term" and "search in selected scope".
    filterBrowserTabs(tabs, query, scope):
      q = String(query).trim().toLowerCase()
      IF q === '' RETURN tabs
      IF scope === 'tabInfo': RETURN tabs WHERE (t.title??'').toLowerCase().includes(q) OR (t.url??'').toLowerCase().includes(q) OR (t.referrer??'').toLowerCase().includes(q)
      IF scope === 'pageText': RETURN tabs WHERE (t.pageText??'').toLowerCase().includes(q)
      IF scope === 'importantTags': RETURN tabs WHERE (t.importantTags??'').toLowerCase().includes(q)
      RETURN tabs

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # UI: window scope toggle; search-scope control (Tab info | Page text | Important elements, default Tab info); control groups with very narrow margins; Title/URL/Block above filter textbox; on searchScope change, if pageText or importantTags fetch that data and merge; search input; on input visibleTabs = filterBrowserTabs(allTabs, searchQuery, searchScope); re-render. Multi-row card per tab. Implements "search scope selection", "filter by selected scope".
    RENDER: FOR each tab in visibleTabs: display card with title, url, referrer, window id, tab id (clickable), bookmark tags (or —)

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # List display mode: user chooses what each list item shows (title only, URL only, or full block). Default block. In non-block mode text is clickable to focus window/tab; remove icon after text. Implements "choose how each tab is shown" and "clickable text in title/url mode".
    DATA: listDisplayMode = 'block' | 'title' | 'url' (default 'block')
    UI: radio group "Show: Title | URL | Block" (e.g. name=browserTabsListDisplayMode, value=title|url|block, default checked=block)
    RENDER (per card): IF listDisplayMode === 'title': clickable title (button .browser-tabs-card-title .browser-tabs-card-focus-link with data-window-id, data-tab-id when valid) then remove icon; IF listDisplayMode === 'url': clickable URL (button .browser-tabs-card-url .browser-tabs-card-focus-link) then remove icon; IF listDisplayMode === 'block': full card (title, url, referrer, ids, tags) with remove icon before Tags line
    ON display-mode change: listDisplayMode = selected value; renderList()

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Remove from display: session-scoped hidden set; remove icon in all modes (after text in title/url, before Tags in block). Refresh clears. Implements "remove from displayed list".
    DATA: hiddenTabIds = Set<number>
    Display list = visibleTabs.filter(t => !hiddenTabIds.has(t.id)); getDisplayedTabs() returns this for copy/close/batch
    RENDER: every card has remove icon (data-action=removeFromDisplay, data-tab-id); in title/url mode after the text, in block before Tags line
    ON remove icon click: tabId = data-tab-id; hiddenTabIds.add(Number(tabId)); renderList()
    ON Refresh button click: hiddenTabIds.clear(); loadTabs()

    ON windowScope toggle change: windowScope = selected; loadTabs()

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Focus on click: in block mode ids line (.browser-tabs-card-ids-link); in title/url mode the text (.browser-tabs-card-focus-link). Both have data-window-id and data-tab-id. On click (delegated): read ids; if valid, chrome.windows.update(windowId, { focused: true }); chrome.tabs.update(tabId, { active: true }).
    ON click .browser-tabs-card-ids-link OR .browser-tabs-card-focus-link: windowId = data-window-id; tabId = data-tab-id; IF both numeric: windows.update(windowId, { focused: true }); tabs.update(tabId, { active: true })

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Bookmark tags: after allTabs built (referrers merged), FOR each tab WHERE url is http(s): reply = getCurrentBookmark({ url, title }); tab.bookmarkTags = reply?.data?.tags ?? []. In RENDER show "Tags: " + join(tab.bookmarkTags) or "—".
    AFTER allTabs built: FOR each tab (http(s) URL): getCurrentBookmark({ url, title }) → tab.bookmarkTags = data.tags ?? []
    ON searchScope change: searchScope = selected; IF selected is pageText or importantTags THEN loadExtraForScope() (fetch and merge); applyFilter(); re-render
    ON searchInput input: searchQuery = value; visibleTabs = filterBrowserTabs(allTabs, searchQuery, searchScope); re-render list

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Copy URLs / Copy Records / Close: unchanged; act on visibleTabs.
    ON Copy button click: urls = visibleTabs.map(t => t.url); navigator.clipboard.writeText(urls.join('\n')); showToastOrMessage("Copied " + urls.length + " URLs")
    ON Copy Records button click: yamlString = buildRecordsYamlForCopy(visibleTabs); navigator.clipboard.writeText(yamlString); showToastOrMessage("Copied " + visibleTabs.length + " record(s)")
    ON Close button click: IF visibleTabs.length === 0 return; IF NOT confirm("Close " + visibleTabs.length + " tabs?") return; FOR each tab in visibleTabs: chrome.tabs.remove(tab.id); show "Closed N tabs"

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Close tabs with tag(s): from visibleTabs take those with Array.isArray(tab.bookmarkTags) && tab.bookmarkTags.length > 0; confirm; chrome.tabs.remove each; then loadTabs().
    ON Close tagged button click: toClose = visibleTabs.filter(t => Array.isArray(t.bookmarkTags) && t.bookmarkTags.length > 0); IF toClose.length === 0 show message and return; IF NOT confirm("Close N tab(s) with tag(s)?") return; FOR each tab in toClose: chrome.tabs.remove(tab.id); await loadTabs(); show "Closed N tabs"
    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Close tabs without tags: from visibleTabs take those with !tab.bookmarkTags || !Array.isArray(tab.bookmarkTags) || tab.bookmarkTags.length === 0; confirm; remove each; then loadTabs().
    ON Close untagged button click: toClose = visibleTabs.filter(t => !Array.isArray(t.bookmarkTags) || t.bookmarkTags.length === 0); IF toClose.length === 0 show message and return; IF NOT confirm("Close N tab(s) without tags?") return; FOR each tab in toClose: chrome.tabs.remove(tab.id); await loadTabs(); show "Closed N tabs"
    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Refresh: clear hidden set then loadTabs() so list repopulates and all tabs can reappear.
    ON Refresh button click: hiddenTabIds.clear(); loadTabs()

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Batch bookmark actions: Set to-read (fetch then merge to preserve tags; create if missing), Clear to-read (skip if no bookmark), Add tags (create if missing; use reply.data.url). Only http(s) URLs. SW returns handler response as-is; handler getCurrentBookmark returns plain dataOut.
    ON Set to-read button click: FOR each tab in visibleTabs WHERE tab.url is http(s): reply = getCurrentBookmark({ url: tab.url, title: tab.title }); IF reply.data.exists AND reply.data.url: saveBookmark({ ...reply.data, toread: 'yes' }); ELSE: urlToSave = reply.data.url || tab.url; saveBookmark({ url: urlToSave, description: tab.title ?? '', tags: [], toread: 'yes', preferredBackend: 'local' }); show "Set to-read for N tabs"
    ON Clear to-read button click: FOR each tab in visibleTabs: reply = getCurrentBookmark({ url: tab.url, title: tab.title }); IF reply.success AND reply.data AND NOT reply.data.blocked AND reply.data.exists: saveBookmark({ ...reply.data, toread: 'no' }); ELSE skip; show "Cleared to-read for N tabs"
    ON Add tags button click: newTags = parseTagsInput(tagsInput.value); IF newTags.length === 0 return; FOR each tab in visibleTabs WHERE tab.url is http(s): reply = getCurrentBookmark({ url: tab.url, title: tab.title }); IF reply.success AND reply.data AND reply.data.url AND NOT reply.data.blocked: IF reply.data.exists: payload = buildAddTagsPayload(reply.data, newTags); saveBookmark(payload); ELSE: urlToSave = reply.data.url || tab.url; saveBookmark({ url: urlToSave, description: tab.title ?? '', tags: newTags, preferredBackend: 'local' }); clear tagsInput; show "Added tags for N tabs"

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Panel structure: same scroll behavior as Tags tree. Panel (#browserTabsPanel) is the scroll container. First child .browser-tabs-above-list (flex: none): header, window scope, search scope, filter, message, actions. Second child .browser-tabs-list-section (min-height: 100%, overflow-y: auto): contains #browserTabsList. Above block scrolls off; list section fills visible height and scrolls list.
    PANEL LAYOUT: browserTabsPanel = scroll container (overflow-y: auto); browser-tabs-above-list = flex none; browser-tabs-list-section = min-height 100% overflow-y auto; #browserTabsList inside list-section.

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Sections and tooltips: controls grouped into sections (Scope, Filter & display, Batch bookmark, List actions, Window actions). Every control has title and where helpful aria-label. Implements "sections for UI controls" and "tooltips on controls".
    SECTIONS: section.browser-tabs-section-scope, section.browser-tabs-section-filter, section.browser-tabs-section-bookmark, section.browser-tabs-section-actions, section.browser-tabs-section-window. Within sections use .browser-tabs-control-group with margin 0.125rem 0 for tight grouping. Order in Filter & display: (1) Title | URL | Block, (2) filter textbox, (3) Important elements checkbox + DOM sources textbox.
    TOOLTIPS: title attribute (and aria-label) on each button, input, label group describing use

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Favicon: allTabs preserve favIconUrl from chrome.tabs. RENDER: each card shows img.browser-tabs-card-favicon with src=tab.favIconUrl (fallback when empty to avoid broken img). Block mode: favicon before title; title/url mode: favicon before the clickable text.
    DATA: tab.favIconUrl from query
    RENDER: <img class="browser-tabs-card-favicon" src="..." alt=""> before title/url in all modes; fallback src or hide when no favicon

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Important elements: checkbox "Important elements" adjacent to DOM sources textbox. When checked: use textbox value (parseImportantTagSources); when unchecked: use default list. Textbox persisted in chrome.storage.local on blur; on load populate from storage or default. Title/URL/Block line stays above filter textbox. Control groups: narrow margins (browser-tabs-control-group).
    parseImportantTagSources(str): return str.trim().split(',').map(s => s.trim()).filter(Boolean)
    ON load: read storage for textbox default; populate input; checkbox state (e.g. useCustomImportantSources) from storage or default true
    ON GET_TABS_IMPORTANT_TAGS: data.tabs; IF checkbox "use custom DOM sources" checked THEN data.importantTagSources = parseImportantTagSources(textboxValue) or default ELSE data.importantTagSources = default

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Gather: move displayed tabs into current window. currentWindowId = (await chrome.windows.getCurrent()).id; FOR each tab in getDisplayedTabs(): IF tab.windowId !== currentWindowId THEN chrome.tabs.move(tab.id, { windowId: currentWindowId, index: -1 }); show "Gathered N tabs" or "All visible tabs already in this window"; loadTabs().
    ON Gather button click: displayed = getDisplayedTabs(); currentWin = await chrome.windows.getCurrent(); moved = 0; FOR each tab in displayed: IF tab.windowId !== currentWin.id: await chrome.tabs.move(tab.id, { windowId: currentWin.id, index: -1 }); moved++; show message; loadTabs()

    # [REQ-SIDE_PANEL_BROWSER_TABS] [ARCH-SIDE_PANEL_BROWSER_TABS] [IMPL-SIDE_PANEL_BROWSER_TABS]
    # Distribute: each displayed tab in its own window; skip if already only tab in window. FOR each tab in getDisplayedTabs(): tabsInWindow = await chrome.tabs.query({ windowId: tab.windowId }); IF tabsInWindow.length > 1: chrome.windows.create({ tabId: tab.id }); show "Distributed N tabs"; loadTabs().
    ON Distribute button click: displayed = getDisplayedTabs(); distributed = 0; FOR each tab in displayed: list = await chrome.tabs.query({ windowId: tab.windowId }); IF list.length > 1: await chrome.windows.create({ tabId: tab.id }); distributed++; show message; loadTabs()
