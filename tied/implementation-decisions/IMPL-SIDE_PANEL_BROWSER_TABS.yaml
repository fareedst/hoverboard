    created:
      date: '2026-02-28'
      author: AI Agent
    last_updated:
      date: '2026-02-28'
      author: AI Agent
      reason: Referrer via GET_TAB_REFERRERS (SW); panel sendMessage and merge map; code_locations and essence_pseudocode updated
