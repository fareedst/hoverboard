    problems_solved: []
    benefits:
      - Testable in isolation with storage mocks
      - Same URL normalization as rest of storage layer
  implementation_approach:
    summary: 'BookmarkUsageTracker in src/features/storage/bookmark-usage-tracker.js. cleanUrl matches bookmark-router. recordVisit(url, referrer) updates usage map and nav edges; debounce via _lastRecordedVisit (url -> timestamp). getUsage, getAllUsage, getMostFrequent(n), getMostRecent(n), getInboundLinks(url), getOutboundLinks(url), getNavigationGraph(), clearUsage(url). Service worker: after updateBadgeForTab, if bookmark.url then get referrer via scripting.executeScript, then usageTracker.recordVisit(tab.url, referrer). Message handler: handleGetBookmarkUsage, handleGetBookmarkUsageStats, handleGetBookmarkNavigationGraph.'
    details:
      - STORAGE_KEY_USAGE = 'hoverboard_bookmark_usage'
      - STORAGE_KEY_EDGES = 'hoverboard_bookmark_nav_edges'
      - RECENT_VISITS_CAP = 10
      - DEBOUNCE_MS = 60000
      - Referrer normalized with cleanUrl; empty or non-http(s) not stored as edge
