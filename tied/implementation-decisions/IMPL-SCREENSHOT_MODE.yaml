IMPL-SCREENSHOT_MODE:
  name: Screenshot/Demo mode for placeholder screenshots
  status: Active
  cross_references:
    - IMPL-LOCAL_BOOKMARK_SERVICE
    - IMPL-UI_TESTABILITY_HOOKS
    - REQ-LOCAL_BOOKMARKS_INDEX
    - REQ-SUGGESTED_TAGS_FROM_CONTENT
    - REQ-RECENT_TAGS_SYSTEM
  rationale:
    why: Enable automated generation of README/docs screenshots with placeholder bookmark data
    problems_solved:
      - Popup opened as a tab in Playwright has that tab as "active", so bookmark data would be for the wrong URL
      - Storage seed was not awaited, so popup could load before data was written
      - No store checkbox checked on index page, so seeded bookmarks were filtered out (REQ-LOCAL_BOOKMARKS_INDEX: Stores default unchecked)
      - Manual screenshot capture is brittle and uses live user data
    benefits:
      - Repeatable screenshot script; no live bookmarks; deterministic placeholder data; optional seed from file
  implementation_approach:
    summary: Popup reads ?screenshot=1&url=...&title=... and uses them as fake current tab; script awaits storage seed, waits for data-screenshot-ready; message handler prefers data.url when http(s); script can load seed from file; script checks Local store before index screenshot
    details:
      - PopupController.loadInitialData checks URL params; when screenshot=1 and url present, skip getCurrentTab() and use decoded url/title; in finally, set data-screenshot-ready on #mainInterface so script can wait for content
      - MessageHandler.handleGetCurrentBookmark: when data.url is present and is http(s), use it as targetUrl so popup-opened-as-tab gets bookmark for the screenshot URL, not the extension tab URL
      - scripts/screenshot-placeholder-data.js exports placeholderStorageSeed (local bookmarks + storage index, hoverboard_theme, hoverboard_demo_suggested_tags, hoverboard_demo_recent_tags) and placeholderSyncSeed (showHoverOnPageLoad); placeholderRecentTags for demo Recent Tags; when _screenshotMode the controller reads hoverboard_demo_suggested_tags and calls updateSuggestedTags, and in loadRecentTags reads hoverboard_demo_recent_tags and calls updateRecentTags (filtering out current bookmark tags) so all three tag sections are visible in screenshots/demo GIF
      - scripts/screenshots-placeholder.js: await chrome.storage.local.set/sync.set in options page; optional --seed=path or SCREENSHOT_SEED_FILE for seed JSON (hoverboard_local_bookmarks, hoverboard_storage_index, hoverboard_theme?, hoverboard_demo_suggested_tags?, hoverboard_demo_recent_tags?, hoverboard_settings?); loadSeedFromFile adds default placeholderSuggestedTags and placeholderRecentTags when keys missing; wait for [data-screenshot-ready="true"] before popup screenshot; check #store-local before bookmarks index screenshot; before side-panel-bookmark.png wait for #bookmarkPanel [data-popup-ref="suggestedTagsContainer"] .tag (timeout 3s) so demo tags are visible; side panel viewport 360px; outputs side-panel-bookmark.png, side-panel-tags-tree.png, side-panel-tabs.png
      - scripts/screenshot-seed.example.json: example seed file matching the expected JSON shape
      - Popup must honor hoverboard_theme so screenshot shows dark popup when seed includes hoverboard_theme dark (see IMPL-POPUP_THEME_CSS)
  code_locations:
    files:
      - path: src/ui/popup/PopupController.js
        description: Screenshot mode param check, _screenshotMode, data-screenshot-ready in finally
      - path: src/core/message-handler.js
        description: handleGetCurrentBookmark prefers data.url when http(s)
      - path: scripts/screenshot-placeholder-data.js
        description: Placeholder bookmark and sync seed data; rich localBookmarks (15+), hero Pinboard entry
      - path: scripts/screenshots-placeholder.js
        description: Playwright script; await seed; side panel URL with ?screenshot=1&url&title; check store-local
      - path: scripts/record-demo-side-panel-this-page.js
        description: Seeds storage; opens side panel with ?screenshot=1&url&title for demo GIF
      - path: scripts/screenshot-seed.example.json
        description: Example seed file for --seed / SCREENSHOT_SEED_FILE
    functions: []
  traceability:
    architecture: []
    requirements:
      - REQ-LOCAL_BOOKMARKS_INDEX
      - REQ-SUGGESTED_TAGS_FROM_CONTENT
      - REQ-RECENT_TAGS_SYSTEM
    tests:
      - tests/unit/screenshot-placeholder-data.test.js
      - tests/unit/popup-suggested-tags.test.js
    code_annotations:
      - IMPL-SCREENSHOT_MODE
  related_decisions:
    depends_on: []
    supersedes: []
    see_also:
      - IMPL-LOCAL_BOOKMARK_SERVICE
      - IMPL-POPUP_THEME_CSS
      - REQ-LOCAL_BOOKMARKS_INDEX
    composed_with:
      - IMPL-LOCAL_BOOKMARK_SERVICE
      - IMPL-POPUP_THEME_CSS
  essence_pseudocode: |
    # [IMPL-SCREENSHOT_MODE] [REQ-LOCAL_BOOKMARKS_INDEX]
    # Placeholder screenshot flow: seed storage, fake tab params, data-screenshot-ready, handleGetCurrentBookmark prefers data.url.
    # Contract: URL params and seed; placeholder UI and script capture.
    INPUT: ?screenshot=1&url=...&title=... (popup/side panel); seed JSON (local bookmarks, storage index, theme); optional --seed=path
    OUTPUT: popup/index/side panel rendered with placeholder data; data-screenshot-ready attribute; script can capture screenshot
    DATA: PopupController._screenshotMode; handleGetCurrentBookmark prefers data.url when http(s); placeholderStorageSeed

    # [IMPL-SCREENSHOT_MODE] [REQ-LOCAL_BOOKMARKS_INDEX]
    # Rich placeholder data: 15+ bookmarks so index and By Tag tree look robust; hero Pinboard entry with 6+ tags and non-empty extended for This Page view.
    localBookmarks: BUILD object keyed by URL; Pinboard entry HAS tags.length >= 6, extended non-empty, toread 'yes'; total entries >= 15; mix of toread yes/no; storageIndex one key per localBookmarks URL, value 'local'

    # Await seed; open popup/index; wait for ready; check store-local for index; capture.
    Script: SEED chrome.storage.local/sync (await set); optional LOAD seed from file; OPEN popup or index; WAIT for [data-screenshot-ready="true"]; CHECK #store-local for index; CAPTURE screenshot

    # Use URL params as fake tab; set data-screenshot-ready in finally.
    Popup load: IF screenshot=1 and url param: USE param as fake tab url/title; SKIP getCurrentTab; IN finally SET data-screenshot-ready on #mainInterface

    # Prefer data.url as targetUrl when http(s) so popup-as-tab gets correct bookmark.
    handleGetCurrentBookmark: IF data.url present and http(s): USE as targetUrl so popup-as-tab gets bookmark for screenshot URL

    # [IMPL-SCREENSHOT_MODE] [REQ-LOCAL_BOOKMARKS_INDEX]
    # Side panel: open with ?screenshot=1&url=screenshotPopupUrl&title=screenshotPopupTitle so Bookmark tab shows Pinboard bookmark (same doc, PopupController reads window.location.search).
    Side panel URL: GOTO side-panel.html?screenshot=1&url=encode(screenshotPopupUrl)&title=encode(screenshotPopupTitle); SET viewport width 360 (or 240); WAIT for tab content; CAPTURE screenshot (This Page, then By Tag, Tabs, etc.); output side-panel-bookmark.png, side-panel-tags-tree.png, side-panel-tabs.png

    # [IMPL-SCREENSHOT_MODE] [PROC-DEMO_RECORDING] Demo GIF script: seed storage then open side panel with same screenshot params so GIF shows rich This Page state.
    record-demo-side-panel-this-page: SEED chrome.storage.local with placeholderStorageSeed via options page; GOTO side-panel.html?screenshot=1&url=...&title=...; record frames; assemble GIF

    # [IMPL-SCREENSHOT_MODE] [REQ-SUGGESTED_TAGS_FROM_CONTENT] Demo suggested tags overlay: in screenshot/demo mode Suggested Tags are empty (no tab.id for injection). Seed hoverboard_demo_suggested_tags (array of strings) in placeholderStorageSeed; PopupController in loadInitialData when _screenshotMode after loadSuggestedTags() reads chrome.storage.local.get('hoverboard_demo_suggested_tags') and if non-empty array calls this.uiManager.updateSuggestedTags(value) so screenshots and demo GIF show sample Suggested Tags.

    # [IMPL-SCREENSHOT_MODE] [REQ-RECENT_TAGS_SYSTEM] Demo recent tags overlay: in screenshot/demo mode Recent Tags are empty (SW in-memory empty). Seed hoverboard_demo_recent_tags (array of strings) in placeholderStorageSeed; placeholderRecentTags exported; PopupController in loadRecentTags() when _screenshotMode calls loadDemoRecentTagsIfScreenshotMode() which reads chrome.storage.local.get('hoverboard_demo_recent_tags'), filters out current bookmark tags, and calls this.uiManager.updateRecentTags(filtered) so side-panel-bookmark.png shows all three tag sections (Current, Recent, Suggested). Script waits for suggestedTagsContainer .tag before capture.
  metadata:
    created:
      date: "2026-02-19"
      author: AI Agent
    last_updated:
      date: "2026-03-03"
      author: AI Agent
      reason: Demo recent tags overlay (hoverboard_demo_recent_tags, loadDemoRecentTagsIfScreenshotMode); REQ-RECENT_TAGS_SYSTEM; script wait for tag sections; unit tests
