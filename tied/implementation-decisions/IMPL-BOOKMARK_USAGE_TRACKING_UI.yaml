IMPL-BOOKMARK_USAGE_TRACKING_UI:
  name: Bookmark Usage Tracking UI Implementation
  status: Active
  cross_references:
    - ARCH-BOOKMARK_USAGE_TRACKING_UI
    - REQ-BOOKMARK_USAGE_TRACKING
    - IMPL-BOOKMARK_USAGE_TRACKING
  rationale:
    why: Implement the three-surface UI so usage data is visible in This Page, Index table, and Usage tab; logic in testable modules; minimal glue in entry points.
    problems_solved: []
    benefits:
      - Users see visit count and last visited per bookmark; can sort/filter by usage; can browse referrer graph
  implementation_approach:
    summary: Surface 1 – HTML section in side-panel.html #bookmarkPanel; UIManager/PopupController fetch getBookmarkUsage(currentUrl) and getInboundLinks(currentUrl) after loadInitialData; render or hide section. Surface 2 – bookmarks-table.html two new columns; bookmarks-table.js fetch getBookmarkUsage (no url), merge by url, renderTableBody + sort. Surface 3 – side-panel-tab-state TAB_USAGE; side-panel.html tab + #usagePanel; usage-panel.js initUsageTab fetches getBookmarkUsageStats and getBookmarkNavigationGraph, renders three sections; side-panel.js initUsageTabIfNeeded.
    details:
      - Surface 1: data-popup-ref usageStatsSection, usageStatsText, usageReferrerText; hide when !usage?.visitCount
      - Surface 2: th data-sort visits, lastVisited; merge b.visits = u.visitCount, b.lastVisited = u.lastVisitedAt; formatTimeAge/formatTimeAbsolute for lastVisited
      - Surface 3: getVisibilityForTab usageVisible; usagePanelEl; initUsageTab in usage-panel.js; Refresh button
  code_locations:
    files:
      - path: src/ui/side-panel/side-panel.html
      - path: src/ui/side-panel/side-panel.js
      - path: src/ui/side-panel/side-panel-tab-state.js
