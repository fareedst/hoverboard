      - tests/unit/side-panel-tabs.test.js
      - tests/unit/service-worker-messaging-routing.test.js
      - tests/playwright/extension-demo-tabs.spec.js
    code_annotations:
      - REQ-SIDE_PANEL_BROWSER_TABS
